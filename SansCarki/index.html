<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Çark Çevirme Oyunu</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>🎰 Şans Çarkı</h1>
    <div class="wheel" id="wheel">
      <div class="segment">🎁 Ödül 1</div>
      <div class="segment">💎 Ödül 2</div>
      <div class="segment">🎮 Ödül 3</div>
      <div class="segment">🚫 Boş</div>
      <div class="segment">💰 Ödül 4</div>
      <div class="segment">🎉 Ödül 5</div>
    </div>
    <button onclick="spinWheel()">Çevir!</button>
    <p id="result"></p>
  </div>

  <script src="script.js"></script>
</body>
</html>
