<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meteor Kaçışı</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="game-shell">
    <section class="topbar">
      <div>
        <span>Skor</span>
        <strong id="score">0</strong>
      </div>

      <div>
        <span>Can</span>
        <strong id="lives">3</strong>
      </div>

      <div>
        <span>Rekor</span>
        <strong id="best">0</strong>
      </div>
    </section>

    <section class="game-board">
      <canvas id="gameCanvas" width="900" height="540"></canvas>

      <div class="overlay" id="overlay">
        <h1>Meteor Kaçışı</h1>
        <p>Yıldızları topla, meteorlardan kaç.</p>
        <button id="startBtn" type="button">Oyuna Başla</button>
      </div>
    </section>

    <section class="controls">
      <button class="control-btn" id="leftBtn" type="button">←</button>
      <button class="control-btn" id="rightBtn" type="button">→</button>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
